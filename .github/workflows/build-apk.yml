name: Build APK Final

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-34 build-tools;34.0.0'

    - name: Install Gradle
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq gradle

    - name: Build APK
      run: |
        cd android-app
        # نمایش نسخه‌ها برای دیباگ
        java --version
        gradle --version
        # اجرای build با لاگ کامل
        gradle assembleRelease --info --stacktrace
      continue-on-error: false

    - name: Find APK
      run: |
        echo "Searching for APK..."
        find android-app -name "*.apk" -type f
        APK=$(find android-app -name "*.apk" -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK generated. Listing build outputs:"
          find android-app -type d
          exit 1
        fi
        echo "APK found at: $APK"
        cp "$APK" img3d.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: img3d-apk
        path: img3d.apk

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Img3D v${{ github.run_number }}
        files: img3d.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
