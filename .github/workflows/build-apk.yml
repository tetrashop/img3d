name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Build Tools
      run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" || true

    - name: Clear Gradle Cache
      run: rm -rf ~/.gradle/caches

    - name: Build APK
      run: |
        cd android-app
        gradle assembleRelease --no-daemon --warning-mode all

    - name: Find APK
      run: |
        echo "Searching for APK..."
        find android-app -name "*.apk" -type f
        APK=$(find android-app -name "*.apk" -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK"
          exit 1
        fi
        echo "APK: $APK"
        cp "$APK" img3d.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: img3d-apk
        path: img3d.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        files: img3d.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
