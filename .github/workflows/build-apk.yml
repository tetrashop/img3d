name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Initialize and Build
      run: |
        # پاسخ Yes به JDK و No به Android SDK (چون SDK را قبلاً نصب کرده‌ایم)
        printf 'No\n' | bubblewrap init --manifest=manifest.json --directory=android --jdk=/usr/lib/jvm/temurin-17-jdk-amd64 --skip-signing-key
        cd android
        bubblewrap build

    - name: Find and Copy APK
      run: |
        APK_PATH=$(find android -name "*.apk" | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found!"
          # لیست تمام فایل‌های android برای debug
          find android -type f
          exit 1
        fi
        cp "$APK_PATH" img3d.apk
        echo "APK found at: $APK_PATH"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: img3d-apk
        path: img3d.apk

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Img3D v${{ github.run_number }}
        files: img3d.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
