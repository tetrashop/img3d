name: Build APK (verbose)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Build Tools
      run: yes | sdkmanager "build-tools;34.0.0" "platforms;android-34" || true

    - name: Build APK with full log
      run: |
        cd android-app
        gradle assembleRelease --info --stacktrace 2>&1 | tee build.log
      continue-on-error: false

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: android-app/build.log

    - name: Find and publish APK
      if: success()
      run: |
        APK=$(find android-app -name "*.apk" | head -1)
        cp "$APK" img3d.apk
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: img3d-apk
        path: img3d.apk

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        files: img3d.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
