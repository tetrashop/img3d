name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Bubblewrap
      run: npm install -g @bubblewrap/cli

    - name: Initialize and Build
      run: |
        # ایجاد پروژه با ورودی خودکار برای جلوگیری از حالت تعاملی
        echo -e "\n\n\n\n\n" | bubblewrap init --manifest=manifest.json --directory=android
        cd android
        bubblewrap build

    - name: Find and Copy APK
      run: |
        APK_PATH=$(find android -name "*.apk" | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "No APK found!"
          exit 1
        fi
        cp "$APK_PATH" img3d.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: img3d-apk
        path: img3d.apk

    - name: Create Release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Img3D v${{ github.run_number }}
        files: img3d.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
