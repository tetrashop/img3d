name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # امکان اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x ./android-app/gradlew

    - name: Build APK with Gradle
      run: |
        cd android-app
        ./gradlew assembleRelease

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4 # ارتقا به نسخه ۴
      with:
        name: img3d-release-apk
        path: android-app/app/build/outputs/apk/release/*.apk

    - name: Create GitHub Release
      if: success()
      uses: softprops/action-gh-release@v2 # ارتقا به نسخه ۲
      with:
        tag_name: v${{ github.run_number }}
        name: "Img3D Release v${{ github.run_number }}"
        files: android-app/app/build/outputs/apk/release/*.apk
        body: |
          ## 🚀 نسخه جدید اپلیکیشن Img3D
          
          **نسخه:** v${{ github.run_number }}
          **تاریخ انتشار:** $(date +%Y-%m-%d)
          
          ### 📱 نحوه نصب
          ۱. فایل APK را دانلود کنید.
          ۲. روی دستگاه اندرویدی خود نصب کنید.
          ۳. سرور Flask را اجرا کنید:
          ```bash
          python public/backend/real_converter.py
          ```
          ۴. برنامه را باز کنید.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
