name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 8.5

    - name: Build APK
      run: |
        cd android-app
        gradle assembleRelease --no-daemon

    - name: Find and prepare APK
      run: |
        APK=$(find android-app -name "*.apk" -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: APK not found!"
          exit 1
        fi
        cp "$APK" img3d.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: img3d-apk
        path: img3d.apk

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        files: img3d.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
